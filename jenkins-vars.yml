---

# jenkins variables
project_name: docker-vscode
external_type: na
custom_version_command: |
  curl -sL https://update.code.visualstudio.com/api/releases/stable | awk -F'"' '{print $2}'
release_type: stable
release_tag: latest
ls_branch: master
repo_vars:
  - BUILD_VERSION_ARG = 'CODE_VERSION'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-vscode'
  - CONTAINER_NAME = 'vscode'
  - DOCKERHUB_IMAGE = 'linuxserver/vscode'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/vscode'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/vscode'
  - DIST_IMAGE = 'debian'
  - MULTIARCH = 'true'
  - CI = 'true'
  - CI_WEB = 'true'
  - CI_PORT = '3001'
  - CI_SSL = 'true'
  - CI_DELAY = '120'
  - CI_DOCKERENV = ''
  - CI_AUTH = ''
  - CI_WEBPATH = ''
